name: Build Moonfin Web Bundle

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      plugin_mode:
        description: Enable plugin mode in generated config.json
        type: boolean
        default: true
      enable_webrtc_scan:
        description: Enable browser WebRTC subnet scan
        type: boolean
        default: true
      default_server_url:
        description: Optional default server URL
        type: string
        default: ''
      discovery_proxy_url:
        description: Optional discovery proxy URL
        type: string
        default: ''
      forced_server_url:
        description: Optional forced server URL
        type: string
        default: ''

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  build-web-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Resolve app version
        id: version
        run: |
          RAW_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '[:space:]')
          SEMVER=$(echo "$RAW_VERSION" | cut -d'+' -f1)
          echo "raw=$RAW_VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Build web bundle
        run: |
          flutter pub get
          flutter build web --wasm --release --base-href "/Moonfin/Web/"

      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Write runtime config
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PLUGIN_MODE: ${{ inputs.plugin_mode }}
          INPUT_ENABLE_WEBRTC_SCAN: ${{ inputs.enable_webrtc_scan }}
          INPUT_DEFAULT_SERVER_URL: ${{ inputs.default_server_url }}
          INPUT_DISCOVERY_PROXY_URL: ${{ inputs.discovery_proxy_url }}
          INPUT_FORCED_SERVER_URL: ${{ inputs.forced_server_url }}
        run: |
          PLUGIN_MODE=true
          ENABLE_WEBRTC_SCAN=true
          DEFAULT_SERVER_URL=""
          DISCOVERY_PROXY_URL=""
          FORCED_SERVER_URL=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PLUGIN_MODE="$INPUT_PLUGIN_MODE"
            ENABLE_WEBRTC_SCAN="$INPUT_ENABLE_WEBRTC_SCAN"
            DEFAULT_SERVER_URL="$INPUT_DEFAULT_SERVER_URL"
            DISCOVERY_PROXY_URL="$INPUT_DISCOVERY_PROXY_URL"
            FORCED_SERVER_URL="$INPUT_FORCED_SERVER_URL"
          fi

          jq -n \
            --arg defaultServerUrl "$DEFAULT_SERVER_URL" \
            --arg discoveryProxyUrl "$DISCOVERY_PROXY_URL" \
            --arg forcedServerUrl "$FORCED_SERVER_URL" \
            --arg pluginMode "$PLUGIN_MODE" \
            --arg enableWebRtcScan "$ENABLE_WEBRTC_SCAN" \
            '{
              schemaVersion: 1,
              defaultServerUrl: (if ($defaultServerUrl | length) > 0 then $defaultServerUrl else null end),
              discoveryProxyUrl: (if ($discoveryProxyUrl | length) > 0 then $discoveryProxyUrl else null end),
              enableWebRtcScan: ($enableWebRtcScan == "true"),
              brandingName: "Moonfin",
              pluginMode: ($pluginMode == "true"),
              forcedServerUrl: (if ($forcedServerUrl | length) > 0 then $forcedServerUrl else null end)
            }' > build/web/config.json

      - name: Write build manifest
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > build/web/build-manifest.json <<EOF
          {
            "schemaVersion": 1,
            "version": "${{ steps.version.outputs.semver }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "flutterVersion": "${{ env.FLUTTER_VERSION }}",
            "baseHref": "/Moonfin/Web/",
            "buildTime": "$BUILD_TIME"
          }
          EOF

      - name: Package web bundle
        id: package
        run: |
          TARBALL="moonfin-web-v${{ steps.version.outputs.semver }}.tar.gz"
          tar -czf "$TARBALL" -C build/web .
          sha256sum "$TARBALL" > "$TARBALL.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonfin-web-bundle-${{ steps.version.outputs.semver }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.tarball }}.sha256
            build/web/build-manifest.json
          if-no-files-found: error

      - name: Upload assets to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.tarball }}.sha256
            build/web/build-manifest.json

name: Auto-update AUR Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Get upstream latest release
        id: upstream
        run: |
          LATEST=$(curl -s https://api.github.com/repos/Moonfin-Client/Mobile-Desktop/releases/latest | jq -r '.tag_name')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Upstream latest version: $LATEST"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat > ~/.ssh/config << EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone AUR package
        run: |
          git clone ssh://aur@aur.archlinux.org/moonfin-bin.git /tmp/aur-package
          cd /tmp/aur-package
          CURRENT_VERSION=$(grep '^pkgver=' PKGBUILD | cut -d'=' -f2)
          CURRENT_SRCINFO_VERSION=$(awk -F' = ' '/^[[:space:]]*pkgver = / {print $2; exit}' .SRCINFO)
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_ENV"
          echo "current_srcinfo_version=$CURRENT_SRCINFO_VERSION" >> "$GITHUB_ENV"
          echo "AUR current version: $CURRENT_VERSION"
          echo "AUR .SRCINFO version: $CURRENT_SRCINFO_VERSION"

      - name: Check if update needed
        id: check
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Upstream returned null, skipping update"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          elif [ "$VERSION" != "$current_version" ] || [ "$VERSION" != "$current_srcinfo_version" ]; then
            echo "Update needed: PKGBUILD=$current_version, SRCINFO=$current_srcinfo_version, upstream=$VERSION"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No update needed (version: $current_version)"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release and calculate checksum
        if: steps.check.outputs.needed == 'true'
        id: download
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          URL="https://github.com/Moonfin-Client/Mobile-Desktop/releases/download/${VERSION}/Moonfin_Linux_v${VERSION}.tar.gz"
          curl -L -o /tmp/moonfin-linux.tar.gz "$URL"
          SHA256=$(sha256sum /tmp/moonfin-linux.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Downloaded release, SHA256: $SHA256"

      - name: Update AUR package
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          SHA256="${{ steps.download.outputs.sha256 }}"
          cd /tmp/aur-package

          git config user.name "${{ vars.GIT_USER_NAME }}"
          git config user.email "${{ vars.GIT_USER_EMAIL }}"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          if grep -q '^depends=' PKGBUILD; then
            sed -i "s/^depends=.*/depends=('gtk3' 'glib2' 'libsecret' 'webkit2gtk-4.1')/" PKGBUILD
          else
            sed -i "/^pkgrel=/a depends=('gtk3' 'glib2' 'libsecret' 'webkit2gtk-4.1')" PKGBUILD
          fi

          printf '%s\n' \
            "pkgbase = moonfin-bin" \
            "    pkgdesc = Jellyfin & Emby media client for Linux (binary release)" \
            "    pkgver = ${VERSION}" \
            "    pkgrel = 1" \
            "    url = https://github.com/Moonfin-Client/Mobile-Desktop" \
            "    arch = x86_64" \
            "    license = GPL-3.0-or-later" \
            "    depends = gtk3" \
            "    depends = glib2" \
            "    depends = libsecret" \
            "    depends = webkit2gtk-4.1" \
            "    provides = moonfin" \
            "    conflicts = moonfin" \
            "    source = moonfin-bin-${VERSION}.tar.gz::https://github.com/Moonfin-Client/Mobile-Desktop/releases/download/${VERSION}/Moonfin_Linux_v${VERSION}.tar.gz" \
            "    sha256sums = ${SHA256}" \
            "" \
            "pkgname = moonfin-bin" > .SRCINFO

          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push origin master

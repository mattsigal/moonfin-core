name: Build Windows ARM64

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.44.1'
  VCPKG_DEFAULT_TRIPLET: arm64-windows
  VCPKG_TARGET_TRIPLET: arm64-windows

jobs:
  build-windows-arm64:
    runs-on: windows-11-arm

    steps:
      - uses: actions/checkout@v4

      - name: Verify ARM64 runner
        shell: pwsh
        run: |
          Write-Host "PROCESSOR_ARCHITECTURE=$env:PROCESSOR_ARCHITECTURE"
          Write-Host "PROCESSOR_ARCHITEW6432=$env:PROCESSOR_ARCHITEW6432"

          if ($env:PROCESSOR_ARCHITECTURE -ne "ARM64") {
            throw "This job must run on a native ARM64 Windows runner"
          }

      - name: Set up Flutter
        shell: pwsh
        run: |
          git clone https://github.com/flutter/flutter.git --branch $env:FLUTTER_VERSION --depth 1 C:\flutter
          echo "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show Flutter environment
        shell: pwsh
        run: |
          flutter --version
          flutter doctor -v

      - name: Assert Flutter is using a native ARM64 Dart SDK
        shell: pwsh
        run: |
          $dartVersion = (& dart --version 2>&1 | Out-String)
          Write-Host $dartVersion

          if ($dartVersion -notmatch 'windows_arm64|arm64') {
            throw @"
          Flutter is using an x64 Dart SDK on this ARM64 runner ($($dartVersion.Trim())).

          update_dart_sdk.ps1 HEAD-requests dart-sdk-windows-arm64.zip for this
          release's engine and falls back to x64 when it is missing. That means
          FLUTTER_VERSION ($env:FLUTTER_VERSION) does not publish an arm64 Dart SDK,
          so the build would target x64 and the arm64 vcpkg libarchive would fail
          to link (LNK4272/LNK1120). Bump FLUTTER_VERSION to a stable release that
          ships the arm64 SDK (>= 3.44.0).
          "@
          }

          Write-Host "OK: native ARM64 Dart SDK detected; flutter build windows will target arm64."

      - name: Enable Windows desktop
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Install Windows ARM64 native dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT

          if (-not $vcpkgRoot) {
            $possibleRoots = @(
              "C:\vcpkg",
              "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\vcpkg",
              "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\vcpkg"
            )

            foreach ($root in $possibleRoots) {
              if (Test-Path (Join-Path $root "vcpkg.exe")) {
                $vcpkgRoot = $root
                break
              }
            }
          }

          if (-not $vcpkgRoot) {
            throw "Could not find vcpkg installation root"
          }

          $vcpkg = Join-Path $vcpkgRoot "vcpkg.exe"

          if (-not (Test-Path $vcpkg)) {
            throw "vcpkg.exe not found at $vcpkg"
          }

          Write-Host "Using vcpkg: $vcpkg"
          & $vcpkg install libarchive:arm64-windows
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install libarchive:arm64-windows failed ($LASTEXITCODE)" }
          & $vcpkg integrate install

          # The Flutter plugin CMakeLists (archive_extract, rar_fork) locate
          # libarchive via $env:VCPKG_ROOT. `vcpkg integrate install` only wires
          # up MSBuild, not Flutter's CMake build, so export VCPKG_ROOT for the
          # build step.
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows release
        shell: pwsh
        env:
          VCPKG_DEFAULT_TRIPLET: arm64-windows
          VCPKG_TARGET_TRIPLET: arm64-windows
        run: |
          flutter clean
          flutter pub get
          flutter build windows --release --dart-define=DISTRIBUTION_CHANNEL=windows

          if (-not (Test-Path "build\windows\arm64")) {
            $produced = (Get-ChildItem build\windows -Directory | ForEach-Object { $_.Name }) -join ", "
            throw "flutter build windows did not produce an arm64 target (found: $produced). Expected build\windows\arm64."
          }

      - name: Verify ARM64 executable
        shell: pwsh
        run: |
          $allExes = Get-ChildItem -Path build/windows -Filter moonfin.exe -Recurse -File

          if (-not $allExes -or $allExes.Count -eq 0) {
            throw "Missing moonfin.exe in build/windows"
          }

          Write-Host "Found executable(s):"
          $allExes | ForEach-Object { Write-Host "  - $($_.FullName)" }

          $releaseExe = $allExes |
            Where-Object { $_.FullName -match "\\arm64\\" } |
            Select-Object -First 1

          if (-not $releaseExe) {
            throw "No moonfin.exe was found under an arm64 build folder."
          }

          $headers = dumpbin /headers $releaseExe.FullName
          $headers | Select-String "machine"

          if (-not ($headers | Select-String "ARM64")) {
            throw "Built executable is not ARM64"
          }

          "RELEASE_EXE=$($releaseExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_DIR=$($releaseExe.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package ARM64 release output
        shell: pwsh
        run: |
          if (-not $env:RELEASE_DIR) {
            throw "RELEASE_DIR was not set"
          }

          $version = (Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1).Line.Split(':', 2)[1].Trim().Split('+')[0]
          $zipPath = Join-Path $PWD "Moonfin_Windows_ARM64_v$version.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $env:RELEASE_DIR '*') -DestinationPath $zipPath -Force

          Write-Host "Packaged ARM64 release from: $env:RELEASE_DIR"
          Write-Host "Created artifact: $zipPath"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: Moonfin_Windows_ARM64_v*.zip
          if-no-files-found: error
<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="A premium client for Jellyfin">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Moonfin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Moonfin</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var ua = (navigator.userAgent || '').toLowerCase();
      var debugFromQuery = false;
      try {
        if (typeof URLSearchParams !== 'undefined') {
          var query = new URLSearchParams(window.location.search || '');
          var keyDebug = (query.get('keydebug') || '').toLowerCase();
          debugFromQuery = keyDebug === '1' || keyDebug === 'true';
        }
      } catch (_) {}

      var debugBridge =
        window.__MOONFIN_KEY_DEBUG__ === true || debugFromQuery;
      var debugCount = 0;
      var debugLimit = 240;

      function logBridge(message, details) {
        if (!debugBridge || debugCount >= debugLimit) return;
        debugCount += 1;
        if (typeof console !== 'undefined' && typeof console.log === 'function') {
          if (details) {
            console.log('[Moonfin][webOS-key] ' + message, details);
          } else {
            console.log('[Moonfin][webOS-key] ' + message);
          }
        }
        if (
          debugCount === debugLimit &&
          typeof console !== 'undefined' &&
          typeof console.log === 'function'
        ) {
          console.log(
            '[Moonfin][webOS-key] log limit reached (' + debugLimit + ')'
          );
        }
      }

      function isTrackedRemoteEvent(code, key) {
        if (
          code === 37 ||
          code === 38 ||
          code === 39 ||
          code === 40 ||
          code === 13 ||
          code === 461 ||
          code === 10009
        ) {
          return true;
        }
        return (
          key === 'ArrowLeft' ||
          key === 'ArrowUp' ||
          key === 'ArrowRight' ||
          key === 'ArrowDown' ||
          key === 'Enter' ||
          key === 'GoBack' ||
          key === 'BrowserBack' ||
          key === 'Back' ||
          key === 'Escape' ||
          key === 'Unidentified'
        );
      }

      var isWebOs =
        ua.indexOf('webos') !== -1 ||
        ua.indexOf('web0s') !== -1 ||
        typeof window.PalmSystem !== 'undefined' ||
        typeof window.webOSSystem !== 'undefined';
      if (isWebOs) {
        window.__MOONFIN_WEBOS__ = true;
      }

      logBridge('bridge initialized', {
        isWebOs: isWebOs,
        forcedWebOs: window.__MOONFIN_WEBOS__ === true,
        userAgent: navigator.userAgent
      });

      var isNormalizing = false;

      function mappedKeyForCode(code) {
        if (code === 37) return 'ArrowLeft';
        if (code === 38) return 'ArrowUp';
        if (code === 39) return 'ArrowRight';
        if (code === 40) return 'ArrowDown';
        if (code === 13) return 'Enter';
        if (code === 461 || code === 10009) return 'GoBack';
        return null;
      }

      function mappedCodeForKey(key) {
        if (key === 'ArrowLeft') return 'ArrowLeft';
        if (key === 'ArrowUp') return 'ArrowUp';
        if (key === 'ArrowRight') return 'ArrowRight';
        if (key === 'ArrowDown') return 'ArrowDown';
        if (key === 'Enter') return 'Enter';
        if (key === 'GoBack') return 'BrowserBack';
        return '';
      }

      function shouldNormalizeKey(eventKey, eventCode, mappedKey) {
        if (!mappedKey) return false;
        if (mappedKey === 'GoBack') {
          var codeMatches = eventCode === 'BrowserBack';
          return (
            !(
              eventKey === 'GoBack' ||
              eventKey === 'BrowserBack' ||
              eventKey === 'Escape' ||
              eventKey === 'Back'
            ) ||
            !codeMatches
          );
        }
        return eventKey !== mappedKey || eventCode !== mappedCodeForKey(mappedKey);
      }

      function handleKeyEvent(e) {
        if (e.type === 'keydown' && e.key === 'Backspace') {
          var tag = document.activeElement && document.activeElement.tagName;
          var editable =
            document.activeElement && document.activeElement.isContentEditable;
          if (tag !== 'INPUT' && tag !== 'TEXTAREA' && !editable) {
            e.preventDefault();
          }
        }

        if (!window.__MOONFIN_WEBOS__ || isNormalizing) return;

        var code = e.keyCode || e.which || 0;
        var mappedKey = mappedKeyForCode(code);
        if (!mappedKey && e.key === 'GoBack') {
          mappedKey = 'GoBack';
        }
        var shouldNormalize = shouldNormalizeKey(e.key, e.code, mappedKey);

        if (isTrackedRemoteEvent(code, e.key)) {
          logBridge('raw ' + e.type, {
            key: e.key,
            code: e.code,
            keyCode: code,
            repeat: !!e.repeat,
            target: e.target && e.target.tagName
          });
        }

        if (!shouldNormalize) return;

        e.preventDefault();
        if (typeof e.stopImmediatePropagation === 'function') {
          e.stopImmediatePropagation();
        }
        if (typeof e.stopPropagation === 'function') {
          e.stopPropagation();
        }

        isNormalizing = true;
        try {
          logBridge('normalize ' + e.type, {
            fromKey: e.key,
            fromCode: e.code,
            fromKeyCode: code,
            toKey: mappedKey,
            toCode: mappedCodeForKey(mappedKey)
          });

          window.dispatchEvent(
            new KeyboardEvent(e.type, {
              key: mappedKey,
              code: mappedCodeForKey(mappedKey),
              location: e.location,
              repeat: e.repeat,
              bubbles: true,
              cancelable: true,
              keyCode: code,
              which: code
            })
          );
        } finally {
          isNormalizing = false;
        }
      }

      window.addEventListener('keydown', handleKeyEvent, true);
      window.addEventListener('keyup', handleKeyEvent, true);
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
